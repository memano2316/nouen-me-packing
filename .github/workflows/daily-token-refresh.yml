name: Daily Token Health Check

on:
  schedule:
    # 毎日 05:00 JST (UTC 20:00) に実行
    - cron: '0 20 * * *'
  workflow_dispatch:  # 手動実行も可能

jobs:
  token-refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Misoca トークンの有効性確認・自動リフレッシュ
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" https://web-production-307b4.up.railway.app/debug)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" = "200" ] && echo "$BODY" | grep -q "token OK"; then
            echo "✅ トークン正常"
          else
            echo "❌ トークンエラー検出: $BODY"
            exit 1
          fi

      - name: エラー時の通知（GitHub Actions の失敗通知がメールで届きます）
        if: failure()
        run: |
          echo "トークンリフレッシュに失敗しました。"
          echo "python3 misoca_auth.py を実行して再認証してください。"
